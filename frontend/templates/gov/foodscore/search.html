{% extends "gov/base_gov.html" %}

{% block content %}
<div class="container py-4">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('gov.home') }}">Government Portal</a></li>
            <li class="breadcrumb-item"><a href="{{ url_for('gov.foodscore_home') }}">FoodScore</a></li>
            <li class="breadcrumb-item active">Search</li>
        </ol>
    </nav>

    <h2 class="mb-4"><i class="bi bi-search me-2"></i>Search Food Products</h2>

    <div class="card mb-4">
        <div class="card-body">
            <form action="{{ url_for('gov.foodscore_search') }}" method="get">
                <div class="input-group">
                    <input type="text" class="form-control" name="q" value="{{ query }}" placeholder="Search products...">
                    <button class="btn btn-success" type="submit">Search</button>
                </div>
            </form>
        </div>
    </div>

    <div class="alert alert-info">
        <i class="bi bi-info-circle me-2"></i>
        Search results will be loaded from the backend API.
    </div>
</div>
{% endblock %}
