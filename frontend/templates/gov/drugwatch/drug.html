{% extends "gov/base_gov.html" %}

{% block content %}
<div class="container py-4">
    <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
            <li class="breadcrumb-item"><a href="{{ url_for('gov.home') }}">Government Portal</a></li>
            <li class="breadcrumb-item"><a href="{{ url_for('gov.drugwatch_home') }}">DrugWatch</a></li>
            <li class="breadcrumb-item active">Drug Details</li>
        </ol>
    </nav>

    <h2 class="mb-4"><i class="bi bi-capsule me-2"></i>Drug Details</h2>

    <div class="alert alert-info">
        <i class="bi bi-info-circle me-2"></i>
        Drug data for ID {{ drug_id }} will be loaded from the backend API.
    </div>
</div>
{% endblock %}
