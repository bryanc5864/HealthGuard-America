{% extends "base.html" %}

{% block title %}{{ title if title else 'Public Portal' }} - HealthGuard{% endblock %}

{% block extra_css %}
<style>
    :root {
        --portal-color: #28a745;
        --portal-light: #e8f5e9;
    }

    .navbar {
        background: linear-gradient(135deg, #28a745 0%, #20c997 100%) !important;
    }

    .module-nav {
        background: white;
        border-bottom: 1px solid #dee2e6;
        padding: 0.5rem 0;
    }

    .module-nav .nav-link {
        color: #495057;
        padding: 0.5rem 1rem;
        border-radius: 8px;
        margin: 0 0.25rem;
    }

    .module-nav .nav-link:hover,
    .module-nav .nav-link.active {
        background: var(--portal-light);
        color: var(--portal-color);
    }

    .module-nav .nav-link i {
        margin-right: 0.5rem;
    }

    .breadcrumb-container {
        background: #f8f9fa;
        padding: 0.75rem 0;
        border-bottom: 1px solid #dee2e6;
    }

    .page-header {
        margin-bottom: 2rem;
    }

    .page-header h1 {
        font-weight: 700;
        color: #1a1a2e;
    }

    .btn-primary {
        background: var(--portal-color);
        border-color: var(--portal-color);
    }

    .btn-primary:hover {
        background: #218838;
        border-color: #218838;
    }
</style>
{% endblock %}
