{% extends "base.html" %}

{% block title %}{{ title if title else 'Public Portal' }} - HealthGuard America{% endblock %}

{% block navbar %}
<nav class="navbar">
    <div class="navbar-container">
        <a href="{{ url_for('landing') }}" class="navbar-brand">
            <i class="bi bi-shield-plus"></i>
            HealthGuard America
        </a>

        <ul class="navbar-nav">
            <li>
                <a href="{{ url_for('public.home') }}" class="nav-link {% if request.endpoint == 'public.home' %}active{% endif %}">
                    <i class="bi bi-house"></i>
                    Home
                </a>
            </li>
            <li>
                <a href="{{ url_for('public.pricevision_home') }}" class="nav-link {% if 'pricevision' in request.endpoint %}active{% endif %}">
                    <i class="bi bi-currency-dollar"></i>
                    PriceVision
                </a>
            </li>
            <li>
                <a href="{{ url_for('public.drugwatch_home') }}" class="nav-link {% if 'drugwatch' in request.endpoint %}active{% endif %}">
                    <i class="bi bi-capsule"></i>
                    DrugWatch
                </a>
            </li>
            <li>
                <a href="{{ url_for('public.foodscore_home') }}" class="nav-link {% if 'foodscore' in request.endpoint %}active{% endif %}">
                    <i class="bi bi-basket"></i>
                    FoodScore
                </a>
            </li>
            <li>
                <a href="{{ url_for('gov.home') }}" class="nav-link">
                    <i class="bi bi-building"></i>
                    Gov Portal
                </a>
            </li>
        </ul>
    </div>
</nav>
{% endblock %}

{% block content %}{% endblock %}
