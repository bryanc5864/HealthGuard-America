services:
  - type: web
    name: healthguard-america
    runtime: python
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: cd frontend && gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: FLASK_ENV
        value: production
